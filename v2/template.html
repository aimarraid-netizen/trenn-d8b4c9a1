<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>Trenn</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1117; --card:#161b22; --card2:#1c2330; --border:#262d3a;
  --txt:#e6edf3; --dim:#8b949e; --accent:#2f81f7; --accent2:#388bfd;
  --green:#3fb950; --yellow:#d29922; --red:#f85149; --blue:#58a6ff; --gray:#6e7681;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  font-size:16px;line-height:1.5;padding-bottom:80px;overscroll-behavior-y:none}
.wrap{max-width:560px;margin:0 auto;padding:16px}
header{position:sticky;top:0;background:rgba(13,17,23,.92);backdrop-filter:blur(10px);
  z-index:50;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
header .back{font-size:22px;color:var(--accent);cursor:pointer;display:none;line-height:1}
header h1{font-size:18px;font-weight:600;flex:1}
header .sub{font-size:12px;color:var(--dim);font-weight:400}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.card.tap{cursor:pointer;transition:transform .08s,background .15s}
.card.tap:active{transform:scale(.985);background:var(--card2)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.chip.accent{background:rgba(47,129,247,.15);color:var(--blue);border-color:rgba(47,129,247,.3)}
.muted{color:var(--dim);font-size:13px}
.big{font-size:22px;font-weight:700}
.title{font-size:16px;font-weight:600;margin-bottom:2px}
/* Kratt notes */
.krat{background:linear-gradient(135deg,#161b22,#1a2230);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.krat h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:10px;font-weight:600}
.krat .note{font-size:14px;padding:7px 0;border-top:1px solid var(--border);color:var(--txt)}
.krat .note:first-of-type{border-top:none}
/* calendar */
.calhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.calhdr button{background:var(--card2);border:1px solid var(--border);color:var(--txt);width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cald{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:9px;font-size:13px;background:var(--card2);color:var(--dim);position:relative;border:1px solid transparent}
.cald.dow{background:none;color:var(--dim);font-size:11px;aspect-ratio:auto;padding:4px 0;font-weight:600}
.cald.empty{background:none}
.cald.has{cursor:pointer;color:var(--txt);font-weight:600}
.cald.has.selg,.cald.has.rind,.cald.has.jalad,.cald.has.jõusaal{background:rgba(47,129,247,.24);border-color:rgba(47,129,247,.62)}
.cald.has.matk{background:rgba(58,217,118,.28);border-color:rgba(58,217,118,.78)}
.cald.has.kõndimine{background:rgba(255,159,28,.30);border-color:rgba(255,159,28,.82)}
.cald.has.rattasõit{background:rgba(191,90,242,.28);border-color:rgba(191,90,242,.76)}
.cald.has.ujumine{background:rgba(0,214,255,.28);border-color:rgba(0,214,255,.78)}
.cald.has.kardio,.cald.has.jooksmine{background:rgba(255,107,53,.30);border-color:rgba(255,107,53,.82)}
.cald.has.kodune{background:rgba(255,196,0,.30);border-color:rgba(255,196,0,.80)}
.cal-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cald .dot{font-size:16px;line-height:1;margin-top:-2px;transform:translateY(-1px)}
/* exercise rows */
.exrow{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;cursor:pointer}
.exrow:active{background:var(--card2)}
.exrow .info{flex:1;min-width:0}
.exrow .nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exrow .meta{display:none}
.spark{width:48px;height:20px;flex-shrink:0}
.stat{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.st-areneb{background:rgba(63,185,80,.15);color:var(--green)}
.st-seisab{background:rgba(210,153,34,.15);color:var(--yellow)}
.st-regress{background:rgba(248,81,73,.15);color:var(--red)}
.st-stabiilne{background:rgba(110,118,129,.15);color:var(--dim)}
.st-vahetus{background:rgba(88,166,255,.15);color:var(--blue)}
.st-uus{background:rgba(163,113,247,.15);color:#a371f7}
/* set table */
.settbl{margin-top:10px}
.setline{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-top:1px solid var(--border);font-size:13px}
.setline:first-child{border-top:none}
.setline .exn{font-weight:600;flex:1}
.setline .reps{color:var(--dim);font-variant-numeric:tabular-nums;text-align:right;min-width:102px}
.exgroup{margin-bottom:2px}
.delta{font-size:12px;font-weight:600;margin-left:6px}
.d-up{color:var(--green)}.d-dn{color:var(--red)}.d-neutral{color:var(--gray)}
.chart-box{height:280px;margin:4px 0;position:relative}
.seg{display:flex;gap:6px;margin-bottom:14px;background:var(--card2);padding:4px;border-radius:10px}
.seg button{flex:1;background:none;border:none;color:var(--dim);padding:8px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.seg button.on{background:var(--accent);color:#fff}
.hide{display:none!important}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.histline{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-size:13px}
.histline:first-child{border-top:none}
.histline .hd{color:var(--dim)}
.empty-state{text-align:center;color:var(--dim);padding:40px 20px}
/* Exercise detail info cards */
.exinfo-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px}
.exinfo-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.exinfo-lbl{font-size:11px;color:var(--dim);margin-bottom:4px;white-space:nowrap}
.exinfo-val{font-size:20px;font-weight:700;color:var(--txt)}
/* Chart legend */
.chart-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;color:var(--dim)}
.legend-item{display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<header>
  <span class="back" id="back">‹</span>
  <div style="flex:1">
    <h1 id="title">Trenn</h1>
    <div class="sub" id="subtitle"></div>
  </div>
</header>
<div class="wrap" id="app"></div>

<script>
const DATA = /*__DATA__*/;
const MONTHS=["Jaanuar","Veebruar","Märts","Aprill","Mai","Juuni","Juuli","August","September","Oktoober","November","Detsember"];
const DOW=["E","T","K","N","R","L","P"];
const EQUIP={trx:"TRX",machine:"masin",cable:"kaabel",barbell:"kang",dumbbell:"hantlid",bodyweight:"kehakaal",cardio:"kardio"};
const STLABEL={areneb:"areneb",seisab:"seisab",regress:"langus",stabiilne:"stabiilne",vahetus:"vahetus",uus:"uus"};
let view={name:"cal",calY:null,calM:null};
let chartRef=null;

function eq(e){return EQUIP[e]||e||"";}
const CARDIO_TYPES=["kõndimine","rattasõit","ujumine","matk","jooksmine","kardio"];
function isCardioType(t){return CARDIO_TYPES.includes(t);}
function cardioIcon(t){return {kõndimine:"🚶",rattasõit:"🚴",ujumine:"🏊",matk:"🌲",jooksmine:"🏃",kardio:"❤️"}[t]||"🏃";}
function workoutIcon(t){
  if(t==="selg"||t==="rind"||t==="jalad"||t==="jõusaal")return"⎯◉⎯";
  if(t==="kodune")return"🏠";
  return {kõndimine:"🚶",rattasõit:"🚴",ujumine:"🏊",matk:"🌲",jooksmine:"🏃",kardio:"❤️"}[t]||"⎯◉⎯";
}
function fmtSet(g){
  if(g.duration!=null&&g.duration>0){
    return `${g.count}×${fmtDur(g.duration)}`;
  }
  let r=g.reps!=null?g.reps:"–";
  let w=g.weight!=null?` · ${g.weight}kg`:"";
  return `${g.count}×${r}${w}`;
}
function fmtDur(s){
  if(s>=60&&s%60===0)return`${s/60}min`;
  if(s>=60)return`${Math.floor(s/60)}min ${s%60}s`;
  return`${s}s`;
}
function fmtMin(m){
  if(m==null||m===""||Number.isNaN(Number(m)))return"?";
  const mm=Math.max(0,Math.floor(Number(m)));
  if(mm>=60){
    const h=Math.floor(mm/60);
    const rem=mm%60;
    return`${String(h).padStart(2,"0")}:${String(rem).padStart(2,"0")}`;
  }
  return `${mm}min`;
}
function fmtMinAxis(m){
  if(m==null||m===""||Number.isNaN(Number(m)))return"?";
  const mm=Math.max(0,Math.round(Number(m)));
  if(mm>=60){
    const h=Math.floor(mm/60);
    const rem=mm%60;
    return`${String(h).padStart(2,"0")}:${String(rem).padStart(2,"0")}`;
  }
  return `${mm} min`;
}
// sparkline mini-svg
function spark(hist,key){
  const vals=hist.map(h=>h[key]).filter(v=>v!=null);
  if(vals.length<2)return"";
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;
  const W=64,H=30,n=vals.length;
  const pts=vals.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-((v-mn)/rng)*H).toFixed(1)}`).join(" ");
  const last=vals[vals.length-1],first=vals[0];
  const col=last>first?"#3fb950":last<first?"#f85149":"#6e7681";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function render(keepScroll){
  const app=document.getElementById("app");
  const back=document.getElementById("back");
  app.className=keepScroll?"wrap":"wrap fade";
  if(view.name==="cal"){back.style.display="none";renderCal(app);}
  else if(view.name==="workout"){back.style.display="block";renderWorkout(app);}
  else if(view.name==="exercise"){back.style.display="block";renderExercise(app);}
  else if(view.name==="exlist"){back.style.display="none";renderExList(app);}
  if(!keepScroll)window.scrollTo(0,0);
}

function setHeader(t,s){document.getElementById("title").textContent=t;document.getElementById("subtitle").textContent=s||"";}

// ===== CALENDAR =====
function renderCal(app){
  setHeader("Trenn",`${DATA.stats.total_workouts} trenni · ${DATA.stats.total_exercises} harjutust`);
  const byDate={};
  DATA.workouts.forEach(w=>byDate[w.date]=w);
  // krat notes
  let html=`<div class="krat"><h3>📡 Kratt märkab</h3>`;
  DATA.krat_notes.forEach(n=>html+=`<div class="note">${n}</div>`);
  html+=`</div>`;
  // muscle balance bars
  html+=`<div class="card"><div class="title">⚖️ Lihasgrupi maht (4 näd)</div>`;
  const mb=DATA.balance,mx=Math.max(...Object.values(mb));
  for(const[mg,v]of Object.entries(mb)){
    const pct=(v/mx*100).toFixed(0);
    html+=`<div style="margin-top:9px"><div class="row"><span class="muted">${mg}</span><span class="muted">${Math.round(v)} kg</span></div>
    <div style="height:7px;background:var(--card2);border-radius:5px;margin-top:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent);border-radius:5px"></div></div></div>`;
  }
  html+=`</div>`;
  // calendar
  if(view.calY==null){const last=DATA.workouts[0];const d=new Date(last.date);view.calY=d.getFullYear();view.calM=d.getMonth();}
  html+=`<div class="card"><div class="calhdr"><button onclick="moveMonth(-1)">‹</button>
    <div class="title" style="margin:0">${MONTHS[view.calM]} ${view.calY}</div>
    <button onclick="moveMonth(1)">›</button></div><div class="calgrid">`;
  DOW.forEach(d=>html+=`<div class="cald dow">${d}</div>`);
  const first=new Date(view.calY,view.calM,1);
  let start=(first.getDay()+6)%7; // Mon=0
  const days=new Date(view.calY,view.calM+1,0).getDate();
  for(let i=0;i<start;i++)html+=`<div class="cald empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${view.calY}-${String(view.calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const w=byDate[ds];
    if(w)html+=`<div class="cald has ${w.type}" onclick="openWorkout(${w.id})">${d}<span class="dot">${workoutIcon(w.type)}</span></div>`;
    else html+=`<div class="cald">${d}</div>`;
  }
  html+=`</div></div>`;
  // kuu kokkuvõte
  const monthWs=DATA.workouts.filter(w=>{const d=new Date(w.date);return d.getFullYear()===view.calY&&d.getMonth()===view.calM;});
  if(monthWs.length){
    const counts={};
    monthWs.forEach(w=>{
      const type=isCardioType(w.type)?w.type:(w.type==="kodune"?"kodune":"jõusaal");
      counts[type]=(counts[type]||0)+1;
    });
    html+=`<div class="card" style="padding:12px 16px"><div class="row" style="flex-wrap:wrap;gap:8px;justify-content:flex-start">`;
    for(const[type,n]of Object.entries(counts)){
      html+=`<div style="display:flex;align-items:center;gap:5px;font-size:14px">
        <span>${workoutIcon(type)}</span>
        <span style="font-weight:600">${n}×</span>
        <span class="muted">${type}</span>
      </div>`;
    }
    html+=`</div></div>`;
  }
  // recent workouts list
  html+=`<div class="title" style="margin:18px 0 10px">Viimased trennid</div>`;
  DATA.workouts.slice(0,8).forEach(w=>{
    const isCardio=isCardioType(w.type);
    const meta=isCardio
      ? `${fmtDate(w.date)} · ${fmtMin(w.duration)}${w.distance_km?" · "+w.distance_km+"km":""}`
      : `${fmtDate(w.date)} · ${fmtMin(w.duration)} · ${w.volume}kg`;
    const badge=isCardio?`<span class="chip" style="font-size:11px">${cardioIcon(w.type)}</span>`:prCount(w);
    html+=`<div class="card tap" onclick="openWorkout(${w.id})"><div class="row">
      <div><div class="title">${w.name||"Trenn"}</div><div class="muted">${meta}</div></div>
      <div style="text-align:right">${badge}</div></div></div>`;
  });
  app.innerHTML=html;
}
function prCount(w){
  const m=(w.insight||"").match(/(\d+) uut rekord/);
  if(m)return`<span class="chip accent">🏆 ${m[1]} PR</span>`;
  if((w.insight||"").includes("rekord"))return`<span class="chip accent">🏆 PR</span>`;
  return"";
}
function moveMonth(dir){const y=window.scrollY;view.calM+=dir;if(view.calM<0){view.calM=11;view.calY--}if(view.calM>11){view.calM=0;view.calY++}render(true);window.scrollTo(0,y);}
function fmtDate(ds){const d=new Date(ds);return`${d.getDate()}. ${MONTHS[d.getMonth()].toLowerCase()}`;}

// ===== WORKOUT =====
function openWorkout(id){view.name="workout";view.wid=id;render();}
function renderWorkout(app){
  const w=DATA.workouts.find(x=>x.id===view.wid);
  setHeader(w.name||"Trenn",`${fmtDate(w.date)} · ${fmtMin(w.duration)}`);
  let html=``;
  if(isCardioType(w.type)){
    // Kardio vaade
    html+=`<div class="card"><div style="text-align:center;font-size:36px;margin-bottom:8px">${cardioIcon(w.type)}</div>`;
    html+=`<div class="row" style="justify-content:space-around;text-align:center">`;
    if(w.distance_km)html+=`<div><div class="big">${w.distance_km}</div><div class="muted">km</div></div>`;
    html+=`<div><div class="big">${fmtMin(w.duration)}</div><div class="muted">aeg</div></div>`;
    if(w.avg_speed_kmh)html+=`<div><div class="big">${w.avg_speed_kmh}</div><div class="muted">km/h</div></div>`;
    if(w.avg_hr)html+=`<div><div class="big">${w.avg_hr}</div><div class="muted">⌀ bpm</div></div>`;
    if(w.kcal)html+=`<div><div class="big">${w.kcal}</div><div class="muted">kcal</div></div>`;
    html+=`</div></div>`;
  } else {
    // Jõutrenn vaade
    html+=`<div class="card"><div class="row">
      <div><div class="big">${w.volume}</div><div class="muted">maht (kg)</div></div>
      <div><div class="big">${fmtMin(w.duration)}</div><div class="muted">aeg</div></div>
      ${w.avg_hr?`<div><div class="big">${w.avg_hr}</div><div class="muted">⌀ pulss</div></div>`:""}
      ${w.kcal?`<div><div class="big">${w.kcal}</div><div class="muted">kcal</div></div>`:""}
    </div></div>`;
  }
  // insight
  if(w.insight){
    html+=`<div class="krat"><h3>📡 Kratt selle trenni kohta</h3>`;
    w.insight.split("\n").forEach(l=>html+=`<div class="note">${l}</div>`);
    html+=`</div>`;
  }
  if(w.exercises&&w.exercises.length){
    // exercises
    html+=`<div class="title" style="margin:16px 0 10px">Harjutused</div>`;
    w.exercises.forEach(ex=>{
      const delta=exDelta(ex.name);
      const g0=(ex.groups&&ex.groups.length)?ex.groups[0]:null;
      const summary=g0?fmtSet(g0):"—";
      html+=`<div class="card tap exgroup" onclick="openExercise('${esc(ex.name)}')">
        <div class="row"><div class="setline" style="border:none;padding:0;flex:1">
          <span class="exn">${ex.name}${delta}</span></div>
          <span class="reps" style="margin-right:10px">${summary}</span>
          <span class="muted" style="font-size:18px">›</span></div>
      </div>`;
    });
  }
  app.innerHTML=html;
}
// delta vs previous session, equipment-aware
function exDelta(name){
  const ex=DATA.exercises[name];if(!ex||ex.history.length<2)return"";
  const h=ex.history,last=h[h.length-1],prev=h[h.length-2];
  if(last.equipment!==prev.equipment)return` <span class="delta d-neutral">↔ vahetus</span>`;
  // Pikk paus (>4 nädalat) -> uus tsükkel, ei võrdle
  const daysDiff=(new Date(last.date)-new Date(prev.date))/(1000*60*60*24);
  if(daysDiff>28)return` <span class="delta d-neutral">↺ uus tsükkel</span>`;
  if(last.weight!=null&&prev.weight!=null){
    // Kaalutõus: näita ainult kaal (roheline). Korduste langus = planeeritud, EI punane.
    if(last.weight>prev.weight)return` <span class="delta d-up">▲ +${(last.weight-prev.weight).toFixed(1)}kg</span>`;
    if(last.weight<prev.weight)return` <span class="delta d-dn">▼ ${(last.weight-prev.weight).toFixed(1)}kg</span>`;
    // Sama kaal: vaata kordusi
    if(last.reps!=null&&prev.reps!=null){
      if(last.reps>prev.reps)return` <span class="delta d-up">▲ +${last.reps-prev.reps} kord</span>`;
      if(last.reps<prev.reps)return` <span class="delta d-dn">▼ ${last.reps-prev.reps} kord</span>`;
    }
  }else if(last.reps!=null&&prev.reps!=null){
    if(last.reps>prev.reps)return` <span class="delta d-up">▲ +${last.reps-prev.reps} kord</span>`;
    if(last.reps<prev.reps)return` <span class="delta d-dn">▼ ${last.reps-prev.reps} kord</span>`;
  }
  return` <span class="delta d-neutral">=</span>`;
}

// ===== EXERCISE =====
function openExercise(name){view.name="exercise";view.ex=name;render();}
function renderExercise(app){
  const ex=DATA.exercises[view.ex];
  setHeader(ex.name,`${ex.muscle} · ${eq(ex.equipment)}`);
  const st=ex.status;
  const last=ex.history.length?ex.history[ex.history.length-1]:null;
  const tgt=ex.target||{};

  // Info-kaardid rida: praegune raskus | skeem | trenne kokku
  let infoHtml=`<div class="exinfo-row">`;
  if(last&&last.weight!=null){
    infoHtml+=`<div class="exinfo-card"><div class="exinfo-lbl">Praegune raskus</div><div class="exinfo-val">${last.weight} kg</div></div>`;
  }
  if(last&&last.sets&&last.reps){
    infoHtml+=`<div class="exinfo-card"><div class="exinfo-lbl">Praegune skeem</div><div class="exinfo-val">${last.sets}×${last.reps}</div></div>`;
  }
  if(tgt.sets&&tgt.reps_min&&tgt.reps_max){
    infoHtml+=`<div class="exinfo-card"><div class="exinfo-lbl">Eesmärk</div><div class="exinfo-val">${tgt.sets}×${tgt.reps_min}–${tgt.reps_max}</div></div>`;
  }
  infoHtml+=`<div class="exinfo-card"><div class="exinfo-lbl">Trenne kokku</div><div class="exinfo-val">${ex.history.length}</div></div>`;
  infoHtml+=`</div>`;

  // Staatus + rekord
  let html=infoHtml;
  html+=`<div class="card" style="padding:12px 16px"><div class="row">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="stat st-${st}">${STLABEL[st]||st}</span>
      ${ex.weeks_stuck&&st==="seisab"?`<span class="muted">~${ex.weeks_stuck} näd</span>`:""}
    </div>
    ${ex.pr?`<div style="text-align:right"><div class="muted" style="font-size:11px">rekord</div><div style="font-weight:600;font-size:14px">${prText(ex)}</div></div>`:""}
  </div></div>`;

  // Legend
  html+=`<div class="chart-legend">
    <span class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#2f81f7"/></svg> Õnnestus</span>
    <span class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,7 7,13 1,7" fill="#f85149"/></svg> Ebaõnnestumine</span>
    <span class="legend-item" style="font-weight:700;color:#e6edf3">3×10</span><span class="legend-item muted">= seeriad × kordused</span>
  </div>`;

  html+=`<div class="card" style="padding:10px 12px"><div class="chart-box"><canvas id="exchart"></canvas></div></div>`;

  // Ajalugu
  html+=`<div class="title" style="margin:16px 0 10px">Ajalugu</div><div class="card">`;
  [...ex.history].reverse().forEach(h=>{
    let val;
    if(h.duration!=null&&h.duration>0)val=fmtDur(h.duration);
    else if(h.weight!=null)val=`${h.sets||3}×${h.reps} · ${h.weight}kg`;
    else val=h.reps!=null?`${h.reps} kordust`:"–";
    const failMark=h.fail?` <span style="color:#f85149;font-size:11px">❌</span>`:"";
    html+=`<div class="histline"><span class="hd">${fmtDate(h.date)}</span><span>${val}${failMark}</span></div>`;
  });
  html+=`</div>`;
  app.innerHTML=html;
  drawChart();
}
function prText(ex){
  const p=ex.pr;
  if(ex.is_time&&ex.history.length){
    const md=Math.max(...ex.history.map(h=>h.duration||0));
    return md?fmtDur(md):"—";
  }
  return p.weight!=null?`${p.weight}kg × ${p.reps}`:`${p.reps} kordust`;
}

function drawChart(){
  const ex=DATA.exercises[view.ex];
  const h=ex.history;
  if(chartRef)chartRef.destroy();
  const ctx=document.getElementById("exchart");
  if(!ctx)return;

  // Aja-põhine (Plank jne)
  if(ex.is_time){
    const labels=h.map(x=>fmtDate(x.date));
    const data=h.map(x=>x.duration!=null?Math.round(x.duration/60*10)/10:null);
    chartRef=new Chart(ctx,{type:"line",data:{labels,datasets:[{label:"Kestus",data,
      borderColor:"#2f81f7",backgroundColor:"rgba(47,129,247,.1)",fill:true,tension:.3,
      pointRadius:5,pointBackgroundColor:"#2f81f7",spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`Kestus: ${fmtMinAxis(i.parsed.y)}`}}},
        scales:{x:{grid:{color:"#1c2330"},ticks:{color:"#6e7681",maxRotation:45,font:{size:10}}},
                y:{grid:{color:"#1c2330"},ticks:{color:"#6e7681",callback:v=>fmtMinAxis(v)}}}}});
    return;
  }

  // Trepp-graafik: raskus Y-teljel, igal punktil silt "3×8"
  // Õnnestumine = sinine ring, ebaõnnestumine = punane romb
  const labels=h.map(x=>fmtDate(x.date));
  const wData=h.map(x=>x.weight);

  // Punkti värv ja kuju
  const ptBg=h.map(x=>x.fail?"#f85149":"#2f81f7");
  const ptBorder=h.map(x=>x.fail?"#ff6b6b":"#58a6ff");
  const ptRadius=h.map(()=>6);
  const ptStyle=h.map(x=>x.fail?"rectRot":"circle"); // rectRot = romb

  // Kohandatud plugin: punkti top-label "3×8"
  const labelPlugin={
    id:"ptLabels",
    afterDatasetsDraw(chart){
      const{ctx:c,scales:{x,y}}=chart;
      h.forEach((pt,i)=>{
        if(pt.weight==null)return;
        const cx=x.getPixelForValue(i);
        const cy=y.getPixelForValue(pt.weight);
        const sets=pt.sets||3;
        const reps=pt.reps||"?";
        const lbl=`${sets}×${reps}`;
        const isFail=pt.fail;
        c.save();
        c.font="bold 11px -apple-system,system-ui,sans-serif";
        c.fillStyle=isFail?"#f85149":"#e6edf3";
        c.textAlign="center";
        c.textBaseline="bottom";
        c.fillText(lbl,cx,cy-10);
        c.restore();
      });
    }
  };

  chartRef=new Chart(ctx,{
    type:"line",
    plugins:[labelPlugin],
    data:{
      labels,
      datasets:[{
        data:wData,
        borderColor:"#2f81f7",
        borderWidth:2,
        backgroundColor:"rgba(47,129,247,.06)",
        fill:true,
        tension:0,           // trepp-efekt: sirged jooned
        stepped:"before",    // trepp: tõus toimub kohe
        pointRadius:ptRadius,
        pointBackgroundColor:ptBg,
        pointBorderColor:ptBorder,
        pointBorderWidth:2,
        pointStyle:ptStyle,
        spanGaps:true,
        hoverRadius:8,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:26,right:10,left:4,bottom:4}},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:items=>{
              const i=items[0].dataIndex;
              return h[i].date;
            },
            label:items=>{
              const i=items.dataIndex;
              const pt=h[i];
              const s=pt.sets||3,r=pt.reps||"?";
              const w=pt.weight!=null?`${pt.weight} kg`:"kaal puudub";
              return [`${w}  ·  ${s}×${r}`,pt.fail?"❌ kordused kukkusid":"✅ õnnestus"];
            }
          },
          backgroundColor:"#1c2330",
          borderColor:"#262d3a",
          borderWidth:1,
          titleColor:"#e6edf3",
          bodyColor:"#8b949e",
          padding:10,
          cornerRadius:8,
        }
      },
      scales:{
        x:{
          grid:{color:"#1c2330"},
          ticks:{color:"#6e7681",maxRotation:45,font:{size:10},autoSkip:true,maxTicksLimit:8}
        },
        y:{
          grid:{color:"#1c2330"},
          ticks:{color:"#6e7681",callback:v=>v+" kg",font:{size:11}},
          grace:"10%"
        }
      }
    }
  });
}

// ===== EXERCISE LIST =====
function renderExList(app){
  setHeader("Harjutused",`${DATA.stats.total_exercises} harjutust`);
  const byMuscle={};
  Object.values(DATA.exercises).forEach(e=>{if(e.is_cardio)return;(byMuscle[e.muscle]=byMuscle[e.muscle]||[]).push(e);});
  let html="";
  for(const[mg,list]of Object.entries(byMuscle)){
    html+=`<div class="title" style="margin:16px 0 10px;text-transform:capitalize">${mg}</div>`;
    list.forEach(e=>{
      html+=`<div class="exrow" onclick="openExercise('${esc(e.name)}')">
        <div class="info"><div class="nm">${e.name}</div></div>
        ${spark(e.history,"weight")||spark(e.history,"reps")}
        <span class="stat st-${e.status}">${STLABEL[e.status]||e.status}</span></div>`;
    });
  }
  app.innerHTML=html;
}

function esc(s){return s.replace(/'/g,"\\'");}
