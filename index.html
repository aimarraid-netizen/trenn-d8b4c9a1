<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Treeningute Kalender</title>

    <!-- iOS Web App optimeeringud -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trenn">

    <!-- Cache control - värskenda alati -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Chart.js for progress graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; position: relative; }
        h1 { text-align: center; margin-bottom: 30px; color: #4CAF50; }
        .timestamp {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 12px;
            color: #999;
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        .month-nav button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .month-nav h2 { color: #fff; }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 30px;
        }
        .day-header {
            background: #2a2a2a;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
        }
        .day {
            background: #2a2a2a;
            padding: 15px 10px;
            text-align: center;
            border-radius: 5px;
            min-height: 80px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .day:hover { transform: scale(1.05); }
        .day.empty { opacity: 0.3; cursor: default; }
        .day.empty:hover { transform: none; }

        .day.gym-jalad { background: #f44336; }
        .day.gym-rind { background: #4CAF50; }
        .day.gym-selg { background: #FFC107; }
        .day.walking { background: #2196F3; }
        .day.running { background: #FF9800; }
        .day.cycling { background: #FF5722; }
        .day.hiking { background: #795548; }
        .day.swimming { background: #00BCD4; }
        .day.multi {
            background: linear-gradient(135deg, #4CAF50 50%, #2196F3 50%);
        }

        .day-number { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .day-icon { font-size: 24px; }
        .day-name { font-size: 12px; margin-top: 5px; font-weight: 600; }
        .day-cardio-info { font-size: 10px; margin-top: 5px; line-height: 1.3; opacity: 0.95; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            max-width: 1000px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close {
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }
        .close:hover { color: #fff; }

        .workout-details {
            margin-bottom: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
        }
        .workout-details.cardio { border-left-color: #2196F3; }
        .workout-details h3 { margin-bottom: 10px; color: #4CAF50; }
        .workout-details.cardio h3 { color: #2196F3; }
        .workout-details p { margin: 5px 0; color: #ccc; }
        .exercise { margin: 10px 0; padding-left: 15px; }

        .workout-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 14px;
        }
        .workout-table th {
            background: #1a1a1a;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #4CAF50;
            color: #4CAF50;
        }
        .workout-table td {
            padding: 10px;
            border-bottom: 1px solid #3a3a3a;
            color: #ccc;
        }
        .workout-table tr:hover {
            background: #333;
        }
        .workout-table .comparison {
            font-size: 12px;
            font-weight: 600;
        }
        .workout-table .comparison.positive {
            color: #4CAF50;
        }
        .workout-table .comparison.negative {
            color: #ff9800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .stat-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #4CAF50; margin: 10px 0; }
        .stat-label { color: #999; font-size: 14px; }

        .progress-section {
            margin-top: 30px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        .progress-section h3 {
            color: #4CAF50;
            margin-bottom: 15px;
        }
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .progress-item {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #4CAF50;
        }
        .progress-item .exercise-name {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .progress-item .progress-value {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
        }
        .progress-item .progress-change {
            font-size: 12px;
            color: #999;
        }
        .progress-item .progress-change.positive {
            color: #4CAF50;
        }
        .recommendations {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #2196F3;
            color: #ccc;
            line-height: 1.6;
        }
        .recommendations h4 {
            color: #2196F3;
            margin-bottom: 10px;
        }

        /* ===================================
           EXERCISE PROGRESS SECTION
           =================================== */
        .exercise-progress-section {
            margin-top: 30px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        .exercise-progress-section h3 {
            color: #4CAF50;
            margin-bottom: 15px;
        }
        .exercise-selector {
            margin-bottom: 20px;
        }
        .exercise-selector select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            cursor: pointer;
        }
        .exercise-selector select:focus {
            outline: none;
            border-color: #66BB6A;
        }
        .chart-container {
            position: relative;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .exercise-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .exercise-stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 3px solid #4CAF50;
        }
        .exercise-stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .exercise-stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .exercise-stat-change {
            font-size: 12px;
            margin-top: 5px;
        }
        .exercise-stat-change.positive {
            color: #4CAF50;
        }

        /* ===================================
           MOBILE RESPONSIVE
           =================================== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 15px;
                padding-top: 35px; /* Ruumi timestamp'ile */
            }

            .timestamp {
                position: fixed;
                top: 10px;
                right: 10px;
                left: auto;
                font-size: 10px;
                padding: 5px 8px;
                z-index: 100;
            }

            .month-nav {
                padding: 10px;
                margin-bottom: 15px;
            }

            .month-nav button {
                padding: 12px 16px;
                font-size: 14px;
                min-width: 80px;
                touch-action: manipulation; /* Touch optimization */
            }

            .month-nav h2 {
                font-size: 18px;
            }

            /* Kalender grid - väiksem gap */
            .calendar {
                gap: 3px;
                margin-bottom: 20px;
            }

            .day-header {
                padding: 6px 2px;
                font-size: 11px;
            }

            .day {
                padding: 8px 4px;
                min-height: 60px;
                touch-action: manipulation;
            }

            .day-number {
                font-size: 16px;
                margin-bottom: 3px;
            }

            .day-icon {
                font-size: 20px;
            }

            .day-name {
                font-size: 9px;
                margin-top: 3px;
                line-height: 1.2;
            }

            .day-cardio-info {
                font-size: 8px;
                margin-top: 3px;
            }

            /* Modal kohandused */
            .modal-content {
                padding: 15px;
                width: 98%;
                max-height: 90vh;
                margin: 10px;
            }

            .modal-header h2 {
                font-size: 18px;
            }

            .close {
                font-size: 28px;
                padding: 5px;
                min-width: 40px;
                min-height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .workout-details {
                padding: 12px;
                margin-bottom: 15px;
            }

            .workout-details h3 {
                font-size: 16px;
            }

            .workout-details p {
                font-size: 13px;
            }

            .workout-table {
                font-size: 11px;
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .workout-table th,
            .workout-table td {
                padding: 6px 4px;
                font-size: 11px;
            }

            /* Stats grid */
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-top: 20px;
            }

            .stat-card {
                padding: 12px;
            }

            .stat-value {
                font-size: 24px;
            }

            .stat-label {
                font-size: 12px;
            }

            /* Progress section */
            .progress-section {
                padding: 15px;
                margin-top: 20px;
            }

            .progress-section h3 {
                font-size: 18px;
                margin-bottom: 12px;
            }

            .progress-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .progress-item {
                padding: 10px;
            }

            .progress-item .exercise-name {
                font-size: 12px;
            }

            .progress-item .progress-value {
                font-size: 16px;
            }

            .progress-item .progress-change {
                font-size: 11px;
            }

            .recommendations {
                padding: 12px;
                font-size: 13px;
                line-height: 1.5;
            }

            .recommendations h4 {
                font-size: 15px;
            }

            /* Exercise progress mobile */
            .exercise-progress-section {
                padding: 15px;
                margin-top: 20px;
            }

            .exercise-progress-section h3 {
                font-size: 18px;
            }

            .exercise-selector select {
                font-size: 14px;
                padding: 10px;
            }

            .exercise-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .exercise-stat-card {
                padding: 10px;
            }

            .exercise-stat-label {
                font-size: 10px;
            }

            .exercise-stat-value {
                font-size: 18px;
            }

            .chart-container {
                padding: 10px;
            }
        }

        /* Extra väikesed ekraanid (< 400px) */
        @media (max-width: 400px) {
            h1 {
                font-size: 20px;
            }

            .month-nav h2 {
                font-size: 16px;
            }

            .day {
                min-height: 50px;
                padding: 6px 2px;
            }

            .day-number {
                font-size: 14px;
            }

            .day-icon {
                font-size: 16px;
            }

            .day-name {
                font-size: 8px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <div class="timestamp">Genereeritud: 01.04.2026 15:25</div>
        <h1>🏋️ Treeningute Kalender</h1>

        <div class="month-nav">
            <button onclick="prevMonth()">← Eelmine</button>
            <h2 id="currentMonth"></h2>
            <button onclick="nextMonth()">Järgmine →</button>

        <div class="calendar" id="calendar"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">🏋️ Jõusaal</div>
                <div class="stat-value" id="gymCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🚶 Kõndimine</div>
                <div class="stat-value" id="walkCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏊 Ujumine</div>
                <div class="stat-value" id="swimCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🚴 Rattasõit</div>
                <div class="stat-value" id="cycleCount">0</div>
            </div>
        </div>

        <div class="progress-section">
            <h3>📈 Progress & Rekordid</h3>
            <div class="progress-grid" id="progressGrid"></div>

            <div class="recommendations" id="recommendations"></div>
        </div>

        <div class="exercise-progress-section">
            <h3>📊 Harjutuste Progress</h3>

            <div class="exercise-selector">
                <select id="exerciseSelect" onchange="showExerciseProgress()">
                    <option value="">-- Vali harjutus --</option>
                </select>
            </div>

            <div id="exerciseStatsContainer" style="display: none;">
                <div class="exercise-stats" id="exerciseStats"></div>

                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalDate"></h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Tühjad ruudud
            for (let i = 0; i < (firstDay || 7) - 1; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                cal.appendChild(empty);
            }

            // Päevad
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayWorkouts = workouts[dateStr] || [];

                const dayEl = document.createElement('div');
                dayEl.className = 'day';

                if (dayWorkouts.length > 0) {
                    const types = [...new Set(dayWorkouts.map(w => {
                        if (w.source === 'gymaholic') {
                            return `gym-${w.workout_type}`;
                        }
                        return w.workout_type;
                    }))];

                    // Värvi kaart
                    const colorMap = {
                        'gym-jalad': '#f44336',   // Punane
                        'gym-rind': '#4CAF50',    // Roheline
                        'gym-selg': '#FFC107',    // Kollane
                        'walking': '#2196F3',     // Sinine
                        'running': '#FF9800',     // Oranž
                        'cycling': '#FF5722',     // Punane-oranž
                        'hiking': '#795548',      // Pruun
                        'swimming': '#00BCD4'     // Tsüaan
                    };

                    if (types.length > 1) {
                        // Dünaamiline gradient tegelike värvidega
                        const colors = types.map(t => colorMap[t] || '#666').slice(0, 2);
                        dayEl.style.background = `linear-gradient(135deg, ${colors[0]} 50%, ${colors[1]} 50%)`;
                        dayEl.className += ' multi';
                    } else {
                        dayEl.className += ` ${types[0]}`;
                    }

                    dayEl.onclick = () => showDetails(dateStr, dayWorkouts);

                    const icons = {
                        'gym-jalad': '🦵',
                        'gym-rind': '💪',
                        'gym-selg': '🏋️',
                        'walking': '🚶',
                        'running': '🏃',
                        'cycling': '🚴',
                        'hiking': '⛰️',
                        'swimming': '🏊'
                    };
                    const icon = types.length > 1 ? '💪' : icons[types[0]] || '🏃';

                    // Treeningu nimi (eemalda ainult number, nt "1. Jalad & kõht" -> "Jalad & kõht")
                    let workoutLabel = '';
                    if (dayWorkouts[0].source === 'gymaholic') {
                        const name = dayWorkouts[0].workout_name || '';
                        const fullName = name.replace(/^\d+\.\s*/, '').trim();
                        workoutLabel = `<div class="day-name">${fullName}</div>`;
                    } else {
                        // Kardio: näita distants ja keskmine pulss
                        const w = dayWorkouts[0];
                        const distanceInfo = w.distance > 0 ? `${w.distance.toFixed(1)}km` : '';
                        const hrInfo = w.avg_hr > 0 ? `${w.avg_hr} bpm` : '';
                        if (distanceInfo || hrInfo) {
                            workoutLabel = `<div class="day-cardio-info">${distanceInfo}${distanceInfo && hrInfo ? '<br>' : ''}${hrInfo}</div>`;
                        }
                    }

                    dayEl.innerHTML = `
                        <div class="day-number">${day}</div>
                        <div class="day-icon">${icon}</div>
                        ${workoutLabel}
                    `;
                } else {
                    dayEl.className += ' empty';
                    dayEl.innerHTML = `<div class="day-number">${day}</div>`;
                }

                cal.appendChild(dayEl);
            }

            document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            updateStats();
        }

        function showDetails(date, dayWorkouts) {
            const modal = document.getElementById('modal');
            const modalDate = document.getElementById('modalDate');
            const modalBody = document.getElementById('modalBody');

            const [y, m, d] = date.split('-');
            modalDate.textContent = `${parseInt(d)}. ${monthNames[parseInt(m) - 1]} ${y}`;

            modalBody.innerHTML = '';

            dayWorkouts.forEach(w => {
                const div = document.createElement('div');
                div.className = w.source === 'gymaholic' ? 'workout-details' : 'workout-details cardio';

                if (w.source === 'gymaholic') {
                    // Leia eelmine sama tüüpi treening
                    const prevWorkout = findPreviousWorkout(w.workout_type, w.timestamp);

                    let exerciseRows = '';
                    if (w.exercises) {
                        w.exercises.forEach(ex => {
                            // Võrdlus eelmise trenniga
                            let weightComparison = '';
                            let repsComparison = '';
                            let weightClass = '';
                            let repsClass = '';

                            if (prevWorkout && prevWorkout.exercises) {
                                const prevEx = prevWorkout.exercises.find(e => e.name === ex.name);
                                if (prevEx) {
                                    const weightDiff = ex.weight_kg - prevEx.weight_kg;
                                    const repsDiff = ex.reps - prevEx.reps;

                                    if (weightDiff > 0) {
                                        weightComparison = ` <span class="comparison positive">(+${weightDiff}kg)</span>`;
                                        weightClass = 'positive';
                                    } else if (weightDiff < 0) {
                                        weightComparison = ` <span class="comparison negative">(${weightDiff}kg)</span>`;
                                        weightClass = 'negative';
                                    }

                                    if (repsDiff > 0) {
                                        repsComparison = ` <span class="comparison positive">(+${repsDiff})</span>`;
                                        repsClass = 'positive';
                                    } else if (repsDiff < 0) {
                                        repsComparison = ` <span class="comparison negative">(${repsDiff})</span>`;
                                        repsClass = 'negative';
                                    }
                                }
                            }

                            // Määra mis näidata Maht veerus
                            let volumeDisplay = '-';
                            if (ex.total_volume > 0) {
                                volumeDisplay = ex.total_volume.toFixed(0) + ' kg';
                            } else if (ex.duration_sec > 0) {
                                // Kui on kestus (Rowing, Walking), näita seda
                                const totalMins = Math.floor(ex.duration_sec / 60);
                                if (totalMins < 60) {
                                    // Alla tunni: "5 min"
                                    volumeDisplay = `${totalMins} min`;
                                } else {
                                    // Üle tunni: "1:05" (hh:mm)
                                    const hours = Math.floor(totalMins / 60);
                                    const mins = totalMins % 60;
                                    volumeDisplay = `${hours}:${mins.toString().padStart(2, '0')}`;
                                }
                            }

                            exerciseRows += `
                                <tr>
                                    <td>${ex.name}</td>
                                    <td>${ex.sets}</td>
                                    <td>${ex.reps}${repsComparison}</td>
                                    <td>${ex.weight_kg > 0 ? ex.weight_kg + ' kg' + weightComparison : '-'}</td>
                                    <td>${volumeDisplay}</td>
                                    <td>${ex.avg_hr > 0 ? ex.avg_hr + ' bpm' : '-'}</td>
                                </tr>
                            `;
                        });
                    }

                    // Eemalda numbrid trenni nimest (nt "1. Jalad & kõht" -> "Jalad & kõht")
                    const cleanWorkoutName = w.workout_name ? w.workout_name.replace(/^\d+\.\s*/, '') : 'Jõutreening';

                    div.innerHTML = `
                        <h3>🏋️ ${cleanWorkoutName}</h3>
                        <p><strong>Kestus:</strong> ${w.duration_min || 0} min | <strong>Kogumaht:</strong> ${(w.total_volume || 0).toFixed(0)} kg${w.avg_hr && w.avg_hr > 0 ? ` | <strong>Keskmine pulss:</strong> ${w.avg_hr} bpm` : ''}</p>
                        <table class="workout-table">
                            <thead>
                                <tr>
                                    <th>Harjutus</th>
                                    <th>Setid</th>
                                    <th>Kordused</th>
                                    <th>Kaal</th>
                                    <th>Maht</th>
                                    <th>Pulss</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${exerciseRows}
                            </tbody>
                        </table>
                    `;
                } else {
                    const icon = {
                        'walking': '🚶',
                        'running': '🏃',
                        'cycling': '🚴',
                        'hiking': '⛰️',
                        'swimming': '🏊'
                    }[w.workout_type] || '🏃';

                    div.innerHTML = `
                        <h3>${icon} ${w.workout_name}</h3>
                        ${w.distance > 0 ? `<p><strong>Distants:</strong> ${w.distance.toFixed(2)} km</p>` : ''}
                        <p><strong>Kestus:</strong> ${w.duration_min} min</p>
                        <p><strong>HR:</strong> ${w.avg_hr} avg, ${w.max_hr} max</p>
                        ${w.kcal > 0 ? `<p><strong>Kalorid:</strong> ${w.kcal} kcal</p>` : ''}
                    `;
                }

                modalBody.appendChild(div);
            });

            modal.classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function updateStats() {
            const allWorkouts = Object.values(workouts).flat();
            document.getElementById('gymCount').textContent = allWorkouts.filter(w => w.source === 'gymaholic').length;
            document.getElementById('walkCount').textContent = allWorkouts.filter(w => w.workout_type === 'walking').length;
            document.getElementById('swimCount').textContent = allWorkouts.filter(w => w.workout_type === 'swimming').length;
            document.getElementById('cycleCount').textContent = allWorkouts.filter(w => w.workout_type === 'cycling').length;

            // Progressi arvutamine
            updateProgress(allWorkouts);
        }

        function updateProgress(allWorkouts) {
            const gymWorkouts = allWorkouts.filter(w => w.source === 'gymaholic');

            // Baseline kaalud (Jaanuar 2026)
            const baselines = {
                'Barbell Bench Press': 60,
                'Bent Over Barbell Row': 55,
                'Romanian Deadlift': 50,
                'Barbell Squat': 55,
                'Barbell Curl': 30
            };

            // Leia iga harjutuse parim tulemus
            const prs = {};
            gymWorkouts.forEach(w => {
                if (w.exercises) {
                    w.exercises.forEach(ex => {
                        const name = ex.name;
                        const weight = ex.weight_kg || 0;
                        const reps = ex.reps || 0;

                        if (weight > 0 && !name.toLowerCase().includes('rowing') && !name.toLowerCase().includes('treadmill')) {
                            if (!prs[name] || weight > prs[name].weight || (weight === prs[name].weight && reps > prs[name].reps)) {
                                prs[name] = { weight, reps, sets: ex.sets || 0 };
                            }
                        }
                    });
                }
            });

            // Näita TOP 5 progressi
            const progressGrid = document.getElementById('progressGrid');
            progressGrid.innerHTML = '';

            const sortedPrs = Object.entries(prs)
                .filter(([name]) => baselines[name]) // Ainult baseline harjutused
                .sort((a, b) => b[1].weight - a[1].weight)
                .slice(0, 5);

            sortedPrs.forEach(([name, pr]) => {
                const baseline = baselines[name];
                const diff = pr.weight - baseline;
                const pct = ((diff / baseline) * 100).toFixed(0);
                const changeClass = diff > 0 ? 'positive' : '';

                const item = document.createElement('div');
                item.className = 'progress-item';
                item.innerHTML = `
                    <div class="exercise-name">${name}</div>
                    <div class="progress-value">${pr.sets}×${pr.reps} @ ${pr.weight}kg</div>
                    <div class="progress-change ${changeClass}">
                        Baseline: ${baseline}kg → ${diff > 0 ? '+' : ''}${diff}kg (${diff > 0 ? '+' : ''}${pct}%)
                    </div>
                `;
                progressGrid.appendChild(item);
            });

            // Genereeri soovitused
            generateRecommendations(gymWorkouts, allWorkouts);
        }

        function generateRecommendations(gymWorkouts, allWorkouts) {
            const recommendations = document.getElementById('recommendations');

            // Arvuta viimase 2 nädala treeningud
            const twoWeeksAgo = new Date();
            twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);

            const recentGym = gymWorkouts.filter(w => {
                const wDate = new Date(w.timestamp || w.date);
                return wDate >= twoWeeksAgo;
            });

            const recentCardio = allWorkouts.filter(w => {
                const wDate = new Date(w.timestamp || w.date);
                return w.source === 'workoutdoor' && wDate >= twoWeeksAgo;
            });

            let tips = '<h4>💡 Soovitused</h4>';

            // Treeningute sagedus
            if (recentGym.length < 3) {
                tips += '<p>⚠️ Viimase 2 nädala jooksul on olnud ainult ' + recentGym.length + ' jõutreeningut. Ideaalne oleks 3-4 treeningut nädalas.</p>';
            } else if (recentGym.length >= 6) {
                tips += '<p>🔥 Suurepärane! ' + recentGym.length + ' jõutreeningut 2 nädala jooksul. Hoia seda tempot!</p>';
            } else {
                tips += '<p>✅ Hea! ' + recentGym.length + ' jõutreeningut 2 nädala jooksul. Jätka samas vaimus!</p>';
            }

            // Kardio
            if (recentCardio.length === 0) {
                tips += '<p>💙 Lisa vahelduseks kardiot (kõnd, rattasõit, ujumine) – aitab taastumisele ja üldisele vormile.</p>';
            } else {
                tips += '<p>💙 ' + recentCardio.length + ' kardio treeningut viimase 2 nädala jooksul – suurepärane tasakaal!</p>';
            }

            // Topeltprogressioon meeldetuletus
            tips += '<p>📊 <strong>Topeltprogressioon:</strong> Iga treening +1 kordus. Kui jõuad vahemiku ülemisse piiri, tõsta raskust 2.5-5kg ja alusta uuesti alumisest piirist.</p>';

            recommendations.innerHTML = tips;
        }

        // ===================================
        // EXERCISE PROGRESS FUNCTIONALITY
        // ===================================

        let exerciseProgressChart = null;

        function initializeExerciseProgress() {
            const allWorkouts = Object.values(workouts).flat();
            const gymWorkouts = allWorkouts.filter(w => w.source === 'gymaholic');

            // Kogume kõik unikaalsed harjutused
            const exercises = new Set();
            gymWorkouts.forEach(w => {
                if (w.exercises) {
                    w.exercises.forEach(ex => {
                        const name = ex.name;
                        // Väldi soojendusi ja lõpetusi
                        if (!name.toLowerCase().includes('rowing') &&
                            !name.toLowerCase().includes('treadmill') &&
                            ex.weight_kg > 0) {
                            exercises.add(name);
                        }
                    });
                }
            });

            // Täida dropdown
            const select = document.getElementById('exerciseSelect');
            const sortedExercises = Array.from(exercises).sort();

            sortedExercises.forEach(exercise => {
                const option = document.createElement('option');
                option.value = exercise;
                option.textContent = exercise;
                select.appendChild(option);
            });
        }

        function showExerciseProgress() {
            const selectedExercise = document.getElementById('exerciseSelect').value;
            const container = document.getElementById('exerciseStatsContainer');

            if (!selectedExercise) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            // Kogume selle harjutuse andmed
            const allWorkouts = Object.values(workouts).flat();
            const gymWorkouts = allWorkouts.filter(w => w.source === 'gymaholic');

            const exerciseData = [];
            gymWorkouts.forEach(w => {
                if (w.exercises) {
                    w.exercises.forEach(ex => {
                        if (ex.name === selectedExercise && ex.weight_kg > 0) {
                            exerciseData.push({
                                date: w.timestamp || w.date,
                                weight: ex.weight_kg,
                                reps: ex.reps,
                                sets: ex.sets,
                                volume: ex.total_volume || 0
                            });
                        }
                    });
                }
            });

            // Sorteeri kuupäeva järgi
            exerciseData.sort((a, b) => a.date.localeCompare(b.date));

            if (exerciseData.length === 0) {
                container.style.display = 'none';
                return;
            }

            // Arvuta statistika
            const currentData = exerciseData[exerciseData.length - 1];
            const firstData = exerciseData[0];
            const prWeight = Math.max(...exerciseData.map(d => d.weight));
            const prReps = Math.max(...exerciseData.filter(d => d.weight === prWeight).map(d => d.reps));

            const weightProgress = currentData.weight - firstData.weight;
            const repsProgress = currentData.reps - firstData.reps;

            // Baseline kaalud
            const baselines = {
                'Barbell Bench Press': 60,
                'Bent Over Barbell Row': 55,
                'Romanian Deadlift': 50,
                'Barbell Squat': 55,
                'Barbell Curl': 30
            };
            const baseline = baselines[selectedExercise];

            // Näita statistikat
            const statsHTML = `
                <div class="exercise-stat-card">
                    <div class="exercise-stat-label">Praegune</div>
                    <div class="exercise-stat-value">${currentData.sets}×${currentData.reps} @ ${currentData.weight}kg</div>
                </div>
                <div class="exercise-stat-card">
                    <div class="exercise-stat-label">Personal Record</div>
                    <div class="exercise-stat-value">${prWeight}kg × ${prReps}</div>
                </div>
                <div class="exercise-stat-card">
                    <div class="exercise-stat-label">Progress (kaal)</div>
                    <div class="exercise-stat-value ${weightProgress > 0 ? 'positive' : ''}">${weightProgress > 0 ? '+' : ''}${weightProgress}kg</div>
                    <div class="exercise-stat-change ${weightProgress > 0 ? 'positive' : ''}">
                        ${((weightProgress / firstData.weight) * 100).toFixed(0)}%
                    </div>
                </div>
                ${baseline ? `
                <div class="exercise-stat-card">
                    <div class="exercise-stat-label">vs Baseline</div>
                    <div class="exercise-stat-value">${baseline}kg → ${currentData.weight}kg</div>
                    <div class="exercise-stat-change positive">+${currentData.weight - baseline}kg</div>
                </div>
                ` : ''}
                <div class="exercise-stat-card">
                    <div class="exercise-stat-label">Treeninguid</div>
                    <div class="exercise-stat-value">${exerciseData.length}</div>
                </div>
            `;

            document.getElementById('exerciseStats').innerHTML = statsHTML;

            // Joonista graafik
            drawProgressChart(exerciseData, selectedExercise, baseline);
        }

        function drawProgressChart(data, exerciseName, baseline) {
            const ctx = document.getElementById('progressChart');

            // Hävita vana graafik
            if (exerciseProgressChart) {
                exerciseProgressChart.destroy();
            }

            // Vorminda kuupäevad
            const labels = data.map(d => {
                const date = new Date(d.date);
                return date.toLocaleDateString('et-EE', { day: '2-digit', month: '2-digit' });
            });

            // Andmed
            const weights = data.map(d => d.weight);
            const reps = data.map(d => d.reps);

            const datasets = [
                {
                    label: 'Kaal (kg)',
                    data: weights,
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    yAxisID: 'y',
                    tension: 0.3,
                    fill: true
                },
                {
                    label: 'Kordused',
                    data: reps,
                    borderColor: '#2196F3',
                    backgroundColor: 'rgba(33, 150, 243, 0.1)',
                    yAxisID: 'y1',
                    tension: 0.3,
                    fill: true
                }
            ];

            // Lisa baseline joon kui on
            if (baseline) {
                datasets.push({
                    label: 'Baseline',
                    data: Array(data.length).fill(baseline),
                    borderColor: '#FF9800',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    yAxisID: 'y',
                    pointRadius: 0
                });
            }

            exerciseProgressChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: exerciseName + ' - Progress',
                            color: '#fff',
                            font: { size: 16 }
                        },
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#999' },
                            grid: { color: '#3a3a3a' }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Kaal (kg)',
                                color: '#4CAF50'
                            },
                            ticks: { color: '#4CAF50' },
                            grid: { color: '#3a3a3a' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Kordused',
                                color: '#2196F3'
                            },
                            ticks: { color: '#2196F3' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        // Initialize
        initializeExerciseProgress();
        renderCalendar();
    </script>
</body>
</html>
