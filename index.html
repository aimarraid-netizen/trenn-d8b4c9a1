<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Treeningute Kalender</title>

    <!-- iOS Web App optimeeringud -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trenn">

    <!-- Cache control - värskenda alati -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Chart.js for progress graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #181818;
            --surface2: #222;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text2: #b0b0b0;
            --text3: #666;
            --accent: #e0bd7a;
            --accent2: #bd9d67;
            --green: #6fc282;
            --red: #d96560;
            --blue: #6fa8d4;
            --purple: #a583ce;
            --orange: #e0a35a;
            --cyan: #6fbbbb;
            --brown: #a4866e;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 960px; margin: 0 auto; }
        .timestamp {
            text-align: right;
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 0;
        }
        .month-nav button {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .month-nav button:hover {
            color: var(--text);
            border-color: var(--accent);
        }
        .month-nav h2 {
            color: var(--text);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 24px;
        }
        .day-header {
            padding: 10px 4px;
            text-align: center;
            font-weight: 500;
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .day {
            background: var(--surface);
            padding: 10px 6px;
            text-align: center;
            border-radius: var(--radius);
            min-height: 76px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            position: relative;
        }
        .day:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }
        .day.empty { opacity: 0.2; cursor: default; border: none; }
        .day.empty:hover { background: var(--surface); }

        .day.gym-jalad { border-left: 3px solid var(--red); }
        .day.gym-rind { border-left: 3px solid var(--green); }
        .day.gym-selg { border-left: 3px solid var(--accent); }
        .day.walking { border-left: 3px solid var(--blue); }
        .day.running { border-left: 3px solid var(--orange); }
        .day.cycling { border-left: 3px solid var(--purple); }
        .day.hiking { border-left: 3px solid var(--brown); }
        .day.swimming { border-left: 3px solid var(--cyan); }
        .day.multi { border-left: 3px solid var(--accent); }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }
        .day-name {
            font-size: 10px;
            margin-top: 3px;
            font-weight: 500;
            line-height: 1.2;
            color: var(--text2);
        }
        .day-cardio-info {
            font-size: 9px;
            margin-top: 2px;
            line-height: 1.2;
            color: var(--text3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: var(--surface);
            padding: 28px;
            border-radius: 10px;
            max-width: 720px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 {
            font-weight: 500;
            font-size: 18px;
        }
        .close {
            font-size: 24px;
            cursor: pointer;
            color: var(--text3);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            transition: all 0.15s;
        }
        .close:hover { color: var(--text); background: var(--surface2); }

        .workout-analysis {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
            border-left: 3px solid var(--purple);
        }
        .workout-analysis h3 {
            margin-bottom: 8px;
            color: var(--purple);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .analysis-text { color: var(--text2); line-height: 1.7; font-size: 14px; }

        .workout-details {
            margin-bottom: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
            border-left: 3px solid var(--green);
        }
        .workout-details.cardio { border-left-color: var(--blue); }
        .workout-details h3 {
            margin-bottom: 8px;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
        }
        .workout-details p { margin: 4px 0; color: var(--text2); font-size: 14px; }

        .workout-table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
            font-size: 13px;
        }
        .workout-table th {
            padding: 8px 10px;
            text-align: left;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            border-bottom: 1px solid var(--border);
        }
        .workout-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }
        .workout-table tr:hover td { color: var(--text); }
        .workout-table .comparison { font-size: 11px; font-weight: 600; }
        .workout-table .comparison.positive { color: var(--green); }
        .workout-table .comparison.negative { color: var(--orange); }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 20px;
        }
        .stat-card {
            background: var(--surface);
            padding: 14px 8px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin: 4px 0;
        }
        .stat-label { color: var(--text); font-size: 14px; letter-spacing: 0.3px; }

        /* Progress */
        .progress-section {
            margin-top: 24px;
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .progress-section h3 {
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .progress-group { margin-bottom: 20px; }
        .progress-group:last-child { margin-bottom: 0; }
        .progress-group-title {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding-left: 6px;
            border-left: 3px solid var(--accent);
        }
        .progress-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .progress-item {
            background: var(--bg);
            padding: 12px 14px;
            border-radius: var(--radius);
            border-left: 2px solid var(--accent);
            display: grid;
            grid-template-columns: minmax(140px, 180px) 1fr auto;
            align-items: center;
            gap: 14px;
        }
        .progress-item .exercise-name {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .progress-item .exercise-name .metric-unit {
            color: var(--text3);
            font-size: 11px;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }
        .progress-item .mini-chart-wrapper {
            position: relative;
            height: 70px;
            min-width: 0;
        }
        .progress-item .progress-summary {
            color: var(--text2);
            font-size: 11px;
            text-align: right;
            white-space: nowrap;
            line-height: 1.4;
        }
        .progress-item .progress-summary .trend {
            font-weight: 600;
            font-size: 13px;
        }
        .progress-item .progress-summary .trend.up { color: var(--green); }
        .progress-item .progress-summary .trend.down { color: var(--red); }
        .progress-item .progress-summary .trend.flat { color: var(--text3); }
        .progress-item .no-data {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
            padding: 20px 0;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 12px; }

            .month-nav button {
                padding: 10px 14px;
                font-size: 13px;
                min-width: 70px;
                touch-action: manipulation;
            }
            .month-nav h2 { font-size: 17px; }

            .calendar { gap: 2px; margin-bottom: 16px; }
            .day-header { padding: 6px 2px; font-size: 10px; }
            .day {
                padding: 7px 3px;
                min-height: 58px;
                touch-action: manipulation;
            }
            .day-number { font-size: 13px; margin-bottom: 2px; }
            .day-name { font-size: 9px; margin-top: 2px; }
            .day-cardio-info { font-size: 8px; }

            .modal.active {
                align-items: flex-start;
                padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
                padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            }
            .modal-content {
                padding: 16px;
                width: 98%;
                max-height: calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 24px);
                margin: 8px;
            }
            .modal-header h2 { font-size: 16px; }

            .workout-details { padding: 12px; }
            .workout-details h3 { font-size: 14px; }
            .workout-details p { font-size: 13px; }

            .workout-table {
                font-size: 11px;
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .workout-table th, .workout-table td {
                padding: 6px 4px;
                font-size: 11px;
            }

            .stats {
                grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
                gap: 4px;
                margin-top: 12px;
            }
            .stat-card { padding: 10px 4px; }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 9px; }

            .progress-section {
                padding: 14px;
                margin-top: 16px;
            }
            .progress-grid { gap: 8px; }
            .progress-item {
                grid-template-columns: 110px 1fr auto;
                gap: 10px;
                padding: 10px 12px;
            }
            .progress-item .exercise-name { font-size: 11px; }
            .progress-item .exercise-name .metric-unit { font-size: 10px; }
            .progress-item .mini-chart-wrapper { height: 56px; }
            .progress-item .progress-summary { font-size: 10px; }
            .progress-item .progress-summary .trend { font-size: 12px; }
        }

        @media (max-width: 400px) {
            .month-nav h2 { font-size: 15px; }
            .day { min-height: 48px; padding: 5px 2px; }
            .day-number { font-size: 12px; }
            .day-name { font-size: 8px; }
            .stats { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
        }
    </style>
</head>

        const analyses = {"2026-03-03 15:56:00": "Selg & biitseps — tugev treening pärast nädalast pausi. Bent Over Row 3×9@55kg näitab head progressi (jaanuaris 3×8@50kg). Lat Pulldown 3×9@50kg ja Seated Cable Rows 3×12@50kg — uus harjutus programmis, hea lisa latsidele. Barbell Curl 30kg juures püsib stabiilselt. Kogumaht 5820kg on sinu selgapäeva rekord siiani.\n\nTopeltprogressioon töötab: Row'is oled kordusi lisanud ja raskust tõstnud. Järgmine samm: Row 3×10@55kg, siis raskuse tõus 60kg peale.", "2026-03-08 14:09:00": "Jalad & kõht — Squat 55kg juures 9-10-9 kordust, stabiilne. Romanian Deadlift 3×11@50kg näitab head progressi (jaanuaris 40kg). Kogumaht 6710kg on tugev jalapäev. Single-Leg Press ja Standing Calf Raise (3×20@40kg) annavad hea lisa.\n\nSoovitus: Squatis proovi järgmine kord kõik 3 setti 10 kordust välja võtta, siis saad raskust 60kg peale tõsta.", "2026-03-10 15:50:00": "Rind, õlg & triitseps — Bench Press 3×9@60kg, hea progress! Jaanuaris alustasid 50kg-ga, nüüd 60kg ja 9 kordust. Incline DB Press 3×12@15kg — vahemiku ülemine piir täis, järgmine kord tõsta 17.5kg peale. Lying Triceps Press 3×12@25kg samuti vahemiku tipus.\n\nKogumaht 3933kg. Triceps Pushdown lisatud programmi — hea isolatsiooniharjutus triitsepsile.", "2026-03-14 14:07:00": "Selg & biitseps — Row 3×10@55kg, Pulldown 3×10@50kg, Cable Rows 3×10@55kg. Kõik põhiharjutused on korralikult vahemiku keskel. Barbell Curl 3×10@30kg püsib stabiilne. Kogumaht 6000kg.\n\nVõrreldes 03.03 treeninguga on Cable Rows raskus 50→55kg tõusnud. Hea näide topeltprogressioonist tegevuses.", "2026-03-15 14:33:00": "Jalad & kõht — Squat 3×10@55kg, kõik setid täis! Nüüd on aeg raskust tõsta → 60kg. Romanian Deadlift 3×10@60kg — 10kg tõus võrreldes jaanuariga. Standing Calf Raise 3×25@40kg — siin samuti vahemiku ülemine piir, tõsta raskust.\n\nKogumaht 7474kg on sinu parim jalapäev! Progressioon on selgelt nähtav: jan 2800kg → märts 7474kg.", "2026-03-17 16:05:00": "Rind, õlg & triitseps — Bench Press 3×10@60kg! Vahemiku ülemine piir täis, järgmine kord 65kg. See on märkimisväärne progress: jaanuaris 50kg, nüüd 60kg×10. Incline DB Press tõusnud 17.5kg peale. Seated Triceps Press uue harjutusena asendab Dipse — hea valik, annab triitsepsile teise nurga.\n\nLying Triceps Press 3×10@27.5kg — ka siin raskus tõusnud. Kogumaht 4584kg, sinu parim rinnapäev.", "2026-03-21 14:08:00": "Selg & biitseps — Bent Over Row 3×10@60kg! Suur hüpe — jaanuaris 40kg, nüüd 60kg. Pulldown 3×11@50kg ja Cable Rows 3×11@55kg — mõlemas kordused kasvavad. Barbell Curl 3×11@30kg, peaaegu valmis 32.5kg jaoks.\n\nKogumaht 6630kg, uus selgapäeva rekord. Seljalihastes on progress olnud kiireim — 3 kuu jooksul on Row raskus +50%.", "2026-03-22 14:02:06": "Tubli 62-minutiline õhtune jalutuskäik 6km distantsiga – aktiivne liikumine on paigas, kuid pulss jäi peamiselt Z1 tsooni (alla 132 bpm), mis tähendab, et rasvapõletuse optimaalne Z2 tsoon (132-144) jäi seekord suuresti kasutamata.\n\n✅ **Plussid:**\n- 62 min järjepidev liikumine ja 649 kcal kulutatud – see on korralik kaloripõletus! 🔥\n- 6.06 km distants heas tempos (~10.2 min/km) – jalad liiguvad! 🚶\n- Max HR 140 bpm näitab, et mõnedel hetkedel jõudsid Z2 tsooni – hea märk!\n\n⚠️ **Miinused:**\n- Keskmine HR 129 bpm jäi Z1 tsooni (121-132) – rasvapõletuse optimaalne Z2 (132-144) jäi kasutamata\n- Kaalulangetus eesmärgi juures on Z2 kriitiline – sellise tempoga käimine annab küll kaloripõletust, aga mitte maksimaalset rasvapõletust\n\n🎯 **Soovitused:**\n- Tõsta kõndimistempot ~0.5-1 km/h võrra, et keskmine HR jõuaks 132-140 bpm vahele (Z2) – see on su rasvapõletuse 'magus koht' 🎯\n- Lisa kergelt mäkke/kaldele kõndimine kui võimalik – see tõstab HR-i ilma tempot suurendamata, ideaalne Z2 hoidmiseks\n- Eesmärk: järgmisel jalutuskäigul hoida HR 132-144 vahel vähemalt 30-40 minutit – see loeb juba täisväärtusliku rasvapõletuse treeninguna ⭐", "2026-03-23 15:32:43": "Korralik 67-minutiline jalutuskäik 7km ja 699 kcal - kestus ja distants on head, aga pulss jäi natuke alla optimaalse Z2 tsooni piiri (128 bpm vs Z2 algus 132 bpm).\n\n✅ **Plussid:**\n- Pikk kestus 67 min ja hea distants 7.0 km - üks parimaid kõndimisi ajaloos (võrreldav 23.03 käiguga)\n- 699 kcal põletatud - märkimisväärne kalorikulu kaalulangetuse eesmärgi jaoks\n- Max HR 142 bpm näitab, et tipphetkedel jõudsid Z2 tsooni - tempo oli kohati õige\n\n⚠️ **Miinused:**\n- Keskmine HR 128 bpm on Z1 tsoonis (121-132), mitte Z2-s (132-144) - rasvapõletus ei olnud optimaalne kogu treeningu vältel\n- Z2 efektiivset aega oli tõenäoliselt vaid osa treeningust (ainult hetked max HR 142 lähedal)\n\n🎯 **Soovitused:**\n- Tõsta tempot ~0.5-1 km/h või lisa kalle (kui treadmill) - eesmärk hoida HR 132-144 bpm KOGU kõndimise vältel Z2 rasvapõletuse tsoonis\n- Proovi järgmisel kõnnil 'talk test' meetodit: peaksid suutma rääkida lühikesi lauseid, aga mitte laulda - see annab Z2 tunde ilma pulsimõõtjata\n- Hea rutiin on käimas - järjepidevus on olemas, lihtsalt natuke intensiivsust juurde! 🔥", "2026-03-24 15:44:00": "Rind, õlg & triitseps — Bench Press 3×6@65kg! Raskus tõusnud 60→65kg, kordused langesid 10→6, mis on täpselt topeltprogressiooni loogika. Nüüd hakka kordusi üles ehitama: 7, 8... kuni jõuad 10-ni, siis 70kg.\n\nIncline DB Press 3×11@17.5kg, Lying Triceps Press 3×11@27.5kg — mõlemad liiguvad üles. Side Lateral Raise 3×15@7kg — ülemine piir täis, tõsta 8kg. Kogumaht 4230kg.", "2026-03-29 14:24:13": "Üsna intensiivne rattasõit Z4 tsoonis – südamelöögisagedus oli keskmiselt 164 bpm, mis tähendab, et suurem osa sõidust toimus lävi-tsoonis, mitte optimaalses rasvapõletuse tsoonis. Kaalulangetuse eesmärgi seisukohalt polnud see ideaalne sessioon, aga kardiovaskulaarne koormus oli korralik.\n\n✅ **Plussid:**\n- Rattasõit on suurepärane mitmekesistus tavapärasele jõusaali+kõndimine rutiinile – keha saab uut stimulatsiooni 🚴\n- 424 kcal 49 minutiga on tugev kalorikulu, mis toetab kaalu langetamist kogu päeva energiabilansi kaudu\n- Max HR 178 bpm on praktiliselt absoluutne maksimum (sinu max on 179) – tähendab, et said kardiovaskulaarselt kõvasti treenitud\n\n⚠️ **Miinused:**\n- Keskmine HR 164 bpm = Z4 (lävi tsoon), mis ei ole optimaalne rasvapõletuseks – ideaalne oleks Z2 (132-144 bpm). Suurem osa sõidust toimus liiga intensiivsel tasemel kaalulangetuse seisukohalt ⚠️\n- Võrreldes varasema rattasõiduga (03.08.2025: 190 min, 24.5 km, HR 154 bpm) oli see sessioon samuti kõrge intensiivsusega – näib et sul on kalduvus rattaga 'liiga kõvasti' sõita\n- Nii kõrge intensiivsus päeval, mil tegid ka selg & biitseps treeningu (29.03), tähendab väga suurt kogukoormust ühele päevale – taastumist vajav kombinatsioon\n\n🎯 **Soovitused:**\n- Järgmisel rattasõidul proovi hoida HR teadlikult Z2 tsoonis (132-144 bpm) – see tähendab aeglasemat tempot, aga optimaalset rasvapõletust. Pane Garmin/kellale HR alarm üles piirile 144 bpm 🎯\n- Jõusaal + intensiivne kardio samal päeval on suur koormus 43-aastasele kehale – proovi kardio teha eraldi päeval või teha see ENNE jõusaali, mitte pärast\n- Kui soovid rattaga Z4 intervalltreeninguid teha, siis planneeri see eraldi päevale ilma jõusaalita ja lisa järgmine päev kerge Z1-Z2 taastumistegevus (jalutuskäik)", "2026-03-31 15:51:00": "Rind, õlg & triitseps — Bench 3×7@65kg, üks kordus rohkem kui 24.03! Topeltprogressioon toimib. Side Lateral Raise 3×12@8kg — raskus tõusnud. Lying Triceps Press 3×12@27.5kg — vahemiku ülemine piir, järgmine kord 30kg.\n\nTriceps Pushdown 3×13@20kg — vahemik ületatud, tõsta raskust. Kogumaht 4653kg, rinnapäeva rekord. Märtsis oli 5 rinnapäeva — hea tihedus.", "2026-04-08 15:58:00": "Tugev seljatrenn kus said kaks uut PR-i (Lat Pulldown ja Seated Cable Rows) ning Barbell Curl tõusis uuele kaalule 32.5kg peale. Bent Over Row sammus tagasi 65kg pealt 60kg peale, mis vajab selgitust.\n\n✅ **Plussid:**\n- 🏆 Wide-Grip Lat Pulldown: UUS PR! Hüpe 50kg → 60kg (+10kg) ja topeltprogressioon töötab ideaalselt - jõudsid 3×12@50kg täis, tõstsid raskust, alustasid 3×10@60kg. Baseline'ist +30kg (+100%) 🔥\n- 🏆 Seated Cable Rows: UUS PR! 55kg → 60kg (+5kg), samuti korrektne topeltprogressioon (3×12@55kg täis → 3×10@60kg). Jätka sama loogikaga: 3×11, 3×12, siis 65kg 💪\n- 🏆 Barbell Curl: UUS PR kaalus! 30kg → 32.5kg, alustasid 3×8-ga mis on vahemiku alumine piir (8-12). Järgmine treening 3×9@32.5kg 📈\n\n⚠️ **Miinused:**\n- ⚠️ Bent Over Barbell Row: langus 65kg pealt tagasi 60kg peale (-5kg) ja kordused 6→7. Eelmine kord tegid 3×6@65kg mis on vahemiku alumine piir - miks tagasi 60kg? Kui 65kg tundus liiga raske, on okei, aga see vajab selgitust. Järgmine samm peaks olema 3×7@65kg, mitte tagasiminek 🤔\n- ⚠️ Face Pull: andmetes näidatakse 3×20 @ 0kg mis tähendab kas kaal polnud salvestatud või tehti ilma kaaluta. Ajalooliselt oled teinud 15-20 kordust 15-25kg juures - palun kontrolli kas kaal oli ikka peal ja salvesta korrektselt järgmine kord\n\n🎯 **Soovitused:**\n- Bent Over Barbell Row: järgmisel selgatreeningul tagasi 65kg peale ja tee 3×7@65kg - see on loogiline järgmine samm topeltprogressioonis. Kui 65kg tundub liiga raske, räägi mulle miks (väsimus, tehnika, valu?) et saaksin paremini nõustada\n- Wide-Grip Lat Pulldown ja Seated Cable Rows: mõlemad on nüüd 3×10@60kg - järgmine treening 3×11@60kg, siis 3×12@60kg, seejärel tõstad 65kg peale. Hoia see progressioon meeles!\n- Barbell Curl 3×8@32.5kg - järgmine treening 3×9@32.5kg. Seated Hammer Curls tegid 3×12@12.5kg mis on vahemiku ülemine piir - järgmine kord tõsta 15kg peale ja alusta 3×10-ga 🎯", "2026-04-11 14:36:00": "Tugevuselt üks parimaid rinna-treeninguid seni - lausa 6 uut PR-i ühes sessioonis! Bench press jõudis 65kg juures 3×8-ni, mis tähendab, et raskuse tõstmine on järgmine samm.\n\n✅ **Plussid:**\n- 🏆 Bench Press 3×8 @ 65kg - topeltprogressiooni vahemik (6-8) on täis! Baseline 50kg → 65kg = +15kg (+30%) alates jaanuarist. Järgmine treening: 3×6 @ 67.5kg\n- 💪 Incline Dumbbell Press hüppas 17.5kg → 20.0kg (+2.5kg) ja Lying Triceps Press 27.5kg → 30.0kg (+2.5kg) - mõlemad raskuse tõstmised on täpselt õige hetk (eelmisel korral vahemiku ülemine piir täis)\n- 📈 Seated Triceps Press järgib ideaalset progressiooni: 3×8 → 3×9 → 3×10 → 3×11 @ 20kg. Veel 1 kordus ja saab raskust tõsta!\n\n⚠️ **Miinused:**\n- ⚠️ Triceps Pushdown with Rope: täna tehti 2×14 + 1×10, mis on ebaühtlane jaotus (eelmisel korral 3×13). Kolmas sett kukkus 14-lt 10-le - kas väsimus lõpus? Ideaalis 3×14 enne raskuse tõstmist\n- 🔍 Incline Dumbbell Press alustas uue raskusega (20kg) alumisest piirist 3×10, mis on korrektne - aga jälgi, et kordused ei jääks 10 peale kinni, vahemik on 10-12\n\n🎯 **Soovitused:**\n- 🎯 Bench Press: tõsta järgmisel korral 67.5kg-le ja alusta 3×6-st - vahemik on täis, progressioon nõuab raskuse tõstmist!\n- 💡 Triceps Pushdown: proovi järgmisel korral teha kõik 3 setti enne kui loed PR-i - eesmärk 3×14 @ 20kg, siis tõsta raskust. Tee see harjutus veidi vähem väsinuna (nihuta treeningus ettepoole)\n- 📊 Seated Triceps Press: veel 1 kordus (3×12) ja saad 20kg → 22.5kg tõsta - oled ühe treeningu kaugusel!", "2026-04-12 13:13:31": "Korralik Z2 kõnditreening – 56 minutit, 6 km, keskmine HR 138 bpm ehk täpselt Z2 tsooni südames (132-144). Rasvapõletuseks ideaalne intensiivsus!\n\n✅ **Plussid:**\n- Z2 tsoon tabatud täpselt 🎯 – keskmine HR 138 bpm on Z2 (132-144) keskel, see on kaalulangetuse jaoks optimaalne rasvapõletuse tsoon\n- Järjepidevus paraneb – märtsis käisid kõndimas 22. ja 23. märtsil, nüüd aprillis jälle. Kardio maht on viimase 4 nädalaga kasvanud +400%! 🔥\n- HR on tõusnud võrreldes märtsi kõndimistega (128-129 → 138 bpm) – see tähendab, et kõndisid aktiivsemalt ja intensiivsemalt, mis on positiivne\n\n⚠️ **Miinused:**\n- Distants ja kestus on lühemad kui märtsi kõndimised – 23. märtsil tegid 7.0 km 67 minutiga, täna 6.0 km 56 minutiga. Tempo on sarnane (~6.3 min/km), aga kogumaht jäi väiksemaks\n- Max HR 153 bpm puudutas Z3 piiri – see pole probleem, aga näitab, et mõnel hetkel läks tempo liiga kõrgeks Z2 jaoks\n\n🎯 **Soovitused:**\n- Pikenda järgmine kõnditreening 70+ minutini – rohkem Z2 aega = rohkem rasvapõletust. Eesmärk: ≥150 min Z2-s nädalas, täna said ~50-55 min\n- Proovi hoida max HR alla 148 bpm – kui HR hakkab tõusma üle 144, aeglusta veidi. Nii püsid kogu treeningu Z2-s ilma Z3-sse libisemata\n- Kombineeri see kõnditreening regulaarseks rutiiniks: 3-4 korda nädalas 60-70 min kõndi + 2-3 jõutrenni = sinu kaalulangetuse valem 💪", "2025-08-03 09:26:14": "Pikk 190-minutiline rattasõit 24.5 km distantsiga - enne jõusaaliperioodi algust (august 2025). Sõit toimus valdavalt Z3-Z4 tsoonis, mis on intensiivsem kui kaalulangetuseks optimaalne, kuid näitab head vastupidavust.\n\n✅ **Plussid:**\n- Tohutu kalorikulu 937 kcal - üks suurimaid üksiku treeningu energiakulusid kogu ajaloos 🔥\n- 190 minutit järjest rattasõitu on suurepärane vastupidavustöö - näitab head aeroobset baasi enne jõusaaliperioodi algust\n- Max HR 179 bpm = täpselt Aimari maksimaalne pulss - näitab, et pingutati täismahusse, andsin kõik!\n\n⚠️ **Miinused:**\n- Keskmine HR 154 bpm on Z3/Z4 piiril - kogu sõit toimus liiga kõrgel intensiivsusel kaalulangetuse seisukohast. Z2 (132-144) oleks rasvapõletuseks efektiivsem 🎯\n- Tempo on suhteliselt madal: 24.5 km / 190 min ≈ 7.7 km/h - see viitab, et kõrge HR tuli maastikust või kehvast vormist, mitte kiirusest. HR drift tõenäoliselt suur.\n- Võrdluseks: 29. märtsi rattasõit (49 min, 11.2 km, sama keskmine HR 164) näitab, et vormiline tase on sarnane - areng on olnud pigem jõusaali suunas, mitte kardio efektiivsuses\n\n🎯 **Soovitused:**\n- Järgmisel rattasõidul proovi hoida HR 132-144 bpm (Z2) - see tähendab aeglasemat tempot, aga rasvapõletus on oluliselt efektiivsem kaalulangetuse eesmärgil 🎯\n- Lühemad, kuid tsoonispetsiifilisemad sõidud (60-90 min Z2-s) annavad kaalulangetuseks parema tulemuse kui 3h Z3-Z4 sõidud\n- Kardio plaan praeguseks: jalutuskäigud (Z2 ~138 bpm) on tegelikult su kõige efektiivsemad kaalulangetuse treeningud - jätka nendega regulaarselt! 👟", "2025-10-26 13:13:39": "Rahulik 50-minutiline ujumistreening Z1 piiril (131 bpm keskmine) - hea madala intensiivsusega liikumine, mis toetab taastumist ja üldist aktiivsust. Kalorite arv (982 kcal) tundub kõrge 50 minuti kohta, aga ujumine ongi kalorimahukas.\n\n✅ **Plussid:**\n- 982 kcal põletatud 50 minutiga - ujumine on suurepärane kaloripõletaja kogu keha treenimiseks 💪\n- Madal HR (131 bpm) näitab kontrolli all hoitud intensiivsust - hea taastumistüüpi treening\n- 50 minutit järjepidevat liikumist basseinis - suurepärane täiendus jõutreeningutele\n\n⚠️ **Miinused:**\n- Keskmine HR 131 bpm jääb napilt Z2 alla (vajaks 132+) - rasvapõletus ei olnud optimaalne\n- 1 km 50 minutiga = 50 min/km tempo on aeglane, mis viitab paljudele puhkepausidele basseinis\n- Puuduvad tsoonide andmed - ei tea täpselt kui palju aega Z1 vs Z2 tsoonis oli\n\n🎯 **Soovitused:**\n- Järgmisel ujumistreeningul proovi hoida tempot pisut kõrgemal, et keskmine HR jõuaks 132-140 bpm piirkonda (Z2 tsoon) - see optimeeriks rasvapõletust 🎯\n- Puhkepause basseinis võiks vähendada - proovi 4×200m intervallidena minimaalse puhkusega, et distants kasvaks 1.2-1.5 km suunas\n- Ujumine sobib ideaalselt taastumispäevaks jõutreeningute kõrvale - planeeri see teadlikult päev pärast rasket jõutreeningut 🏊", "2025-10-28 14:18:29": "Korralik ujumissessioon 46 minutit, 1.02 km – pulssi vaadates oli see päris intensiivne treening Z3-Z4 tsoonis, mis annab märku, et ujumises on veel palju arenguruumi (tugev ujuja hoiaks sama tempo juures madalamat pulssi).\n\n✅ **Plussid:**\n- 846 kcal põletatud on märkimisväärne – ujumine on kaloripõletuselt üks efektiivsemaid spordialasid 💪\n- 46 min järjepidev ujumine näitab head vastupidavust – ei loobunud ega teinud pikki pause\n- Mitmekesisus on hea! Ujumine täiendab jõutreeningut suurepäraselt – liigestele sõbralik, kogu keha töötab\n\n⚠️ **Miinused:**\n- Keskmine HR 145 bpm (Z3) ja max 163 bpm (Z4) – see on pigem intensiivne aeroobne treening, mitte optimaalne rasvapõletuse tsoon (Z2 oleks 132-144). Kaalulangetuse         let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const monthNames = ['Jaanuar', 'Veebruar', 'Märts', 'Aprill', 'Mai', 'Juuni',
                           'Juuli', 'August', 'September', 'Oktoober', 'November', 'Detsember'];
        const dayNames = ['E', 'T', 'K', 'N', 'R', 'L', 'P'];

        function findPreviousWorkout(workoutType, currentTimestamp) {
            // Leia kõik sama tüüpi treeningud
            const allWorkoutsFlat = [];
            Object.keys(workouts).forEach(date => {
                workouts[date].forEach(w => {
                    if (w.source === 'gymaholic' && w.workout_type === workoutType && w.timestamp < currentTimestamp) {
                        allWorkoutsFlat.push(w);
                    }
                });
            });

            // Sorteeri timestampi järgi kahanevas järjekorras ja võta esimene
            allWorkoutsFlat.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
            return allWorkoutsFlat.length > 0 ? allWorkoutsFlat[0] : null;
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            // Päeva päised
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                cal.appendChild(header);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Tühjad ruudud
            for (let i = 0; i < (firstDay || 7) - 1; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                cal.appendChild(empty);
            }

            // Päevad
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayWorkouts = workouts[dateStr] || [];

                const dayEl = document.createElement('div');
                dayEl.className = 'day';

                if (dayWorkouts.length > 0) {
                    const types = [...new Set(dayWorkouts.map(w => {
                        if (w.source === 'gymaholic') {
                            return `gym-${w.workout_type}`;
                        }
                        return w.workout_type;
                    }))];

                    // Värvi kaart (uus stiil)
                    const colorMap = {
                        'gym-jalad': '#d96560',
                        'gym-rind': '#6fc282',
                        'gym-selg': '#e0bd7a',
                        'walking': '#6fa8d4',
                        'running': '#e0a35a',
                        'cycling': '#a583ce',
                        'hiking': '#a4866e',
                        'swimming': '#6fbbbb'
                    };

                    if (types.length > 1) {
                        const colors = types.map(t => colorMap[t] || '#666');
                        dayEl.style.borderLeft = `3px solid ${colors[0]}`;
                        dayEl.style.borderRight = `3px solid ${colors[1]}`;
                        dayEl.className += ' multi';
                    } else {
                        dayEl.className += ` ${types[0]}`;
                    }

                    dayEl.onclick = () => showDetails(dateStr, dayWorkouts);

                    // Treeningu nimed
                    let labels = [];
                    dayWorkouts.forEach(w => {
                        if (w.source === 'gymaholic') {
                            const name = (w.workout_name || '').replace(/^\d+\.\s*/, '').trim();
                            labels.push(`<div class="day-name">${name}</div>`);
                        } else {
                            const cardioNames = {
                                'walking': 'Kõndimine',
                                'running': 'Jooksmine',
                                'cycling': 'Rattasõit',
                                'hiking': 'Matkamine',
                                'swimming': 'Ujumine'
                            };
                            const cardioName = cardioNames[w.workout_type] || w.workout_name || 'Kardio';
                            const distanceInfo = w.distance > 0 ? `${w.distance.toFixed(1)}km` : '';
                            labels.push(`<div class="day-name">${cardioName}</div>` +
                                (distanceInfo ? `<div class="day-cardio-info">${distanceInfo}</div>` : ''));

                    });

                    dayEl.innerHTML = `
                        <div class="day-number">${day}</div>

                    `;
                } else {

                    dayEl.innerHTML = `<div class="day-number">${day}</div>`;
                }

                cal.appendChild(dayEl);
            }

            document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            updateStats();

        function showDetails(date, dayWorkouts) {

            const modalDate = document.getElementById('modalDate');
            const modalBody = document.getElementById('modalBody');

            const [y, m, d] = date.split('-');

            modalBody.innerHTML = '';

                                        weightClass = 'positive';
                                    } else if (weightDiff < 0) {
                                        weightComparison = ` <span class="comparison negative">(${weightDiff}kg)</span>`;
                                        weightClass = 'negative';
                                    }

                                    if (repsDiff > 0) {
                                        repsComparison = ` <span class="comparison positive">(+${repsDiff})</span>`;
                                        repsClass = 'positive';
                                    } else if (repsDiff < 0) {
                                        repsComparison = ` <span class="comparison negative">(${repsDiff})</span>`;
                                        repsClass = 'negative';
                                    }
                                }
                            }

                            // Määra mis näidata Maht veerus
                            let volumeDisplay = '-';

                                volumeDisplay = ex.total_volume.toFixed(0) + ' kg';
                            } else if (ex.duration_sec > 0) {
                                // Kui on kestus (Rowing, Walking), näita seda
                                const totalMins = Math.floor(ex.duration_sec / 60);
                                if (totalMins < 60) {
                                    // Alla tunni: "5 min"
                                    volumeDisplay = `${totalMins} min`;
                                } else {
                                    // Üle tunni: "1:05" (hh:mm)

                                    const mins = totalMins % 60;
                                    volumeDisplay = `${hours}:${mins.toString().padStart(2, '0')}`;

                                    <td>${ex.weight_kg > 0 ? ex.weight_kg + ' kg' + weightComparison : '-'}</td>
                                    <td>${volumeDisplay}</td>

                                </tr>
                            `;
                        });
                    }

                    const cleanWorkoutName = w.workout_name ? w.workout_name.replace(/^\d+\.\s*/, '') : 'Jõutreening';

                    div.innerHTML = `
                        <h3>🏋️ ${cleanWorkoutName}</h3>
                        <p><strong>Kestus:</strong> ${w.duration_min || 0} min | <strong>Kogumaht:</strong> ${(w.total_volume || 0).toFixed(0)} kg${w.avg_hr && w.avg_hr > 0 ? ` | <strong>Keskmine pulss:</strong> ${w.avg_hr} bpm` : ''}</p>
                        <table class="workout-table">

                                    <th>Harjutus</th>

                                    <th>Kordused</th>
                                    <th>Kaal</th>
                                    <th>Maht</th>
                                    <th>Pulss</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${exerciseRows}
                            </tbody>
                        </table>
                    `;
                } else {
                    const icon = {
                        'walking': '🚶',
                        'running': '🏃',
                        'cycling': '🚴',
                        'hiking': '⛰️',
                        'swimming': '🏊'
                    }[w.workout_type] || '🏃';

                    div.innerHTML = `
                        <h3>${icon} ${w.workout_name}</h3>
                        ${w.distance > 0 ? `<p><strong>Distants:</strong> ${w.distance.toFixed(2)} km</p>` : ''}
                        <p><strong>Kestus:</strong> ${w.duration_min} min</p>
                        <p><strong>HR:</strong> ${w.avg_hr} avg, ${w.max_hr} max</p>
                        ${w.kcal > 0 ? `<p><strong>Kalorid:</strong> ${w.kcal} kcal</p>` : ''}
                    `;
                }

                modalBody.appendChild(div);

                // Analüüs antud konkreetse treeningu kohta (timestamp-võti)
                if (analyses[w.timestamp]) {
                    const analysisDiv = document.createElement('div');
                    analysisDiv.className = 'workout-analysis';
                    analysisDiv.innerHTML = `
                        <h3>Analüüs</h3>
                        <div class="analysis-text">${analyses[w.timestamp].replace(/\n/g, '<br>')}</div>
                    `;
                    modalBody.appendChild(analysisDiv);
                }
            });

            modal.classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function updateStats() {
            // Filtreeri ainult valitud kuu treeningud
            const monthPrefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            const monthWorkouts = Object.entries(workouts)
                .filter(([date]) => date.startsWith(monthPrefix))
                .flatMap(([, ws]) => ws);

            const statCounts = {
                gymCount: monthWorkouts.filter(w => w.source === 'gymaholic').length,
                walkCount: monthWorkouts.filter(w => w.workout_type === 'walking').length,
                swimCount: monthWorkouts.filter(w => w.workout_type === 'swimming').length,
                cycleCount: monthWorkouts.filter(w => w.workout_type === 'cycling').length,
                runCount: monthWorkouts.filter(w => w.workout_type === 'running').length,
                hikeCount: monthWorkouts.filter(w => w.workout_type === 'hiking').length,
            };
            Object.entries(statCounts).forEach(([id, count]) => {
                const el = document.getElementById(id);
                el.textContent = count;
                el.closest('.stat-card').style.display = count > 0 ? '' : 'none';
            });

            // Progressi arvutamine (kogu ajalugu)
            const allWorkouts = Object.values(workouts).flat();
            updateProgress(allWorkouts);
        }

        const TYPE_LABELS = {
            'rind': 'Rind, õlg & triitseps',
            'selg': 'Selg & biitseps',
            'jalad': 'Jalad & kõht',
            'strength': 'Muud',
            'walking': '🚶 Kõndimine',
            'running': '🏃 Jooksmine',
            'cycling': '🚴 Rattasõit',
            'swimming': '🏊 Ujumine',
            'hiking': '⛰️ Matkamine'
        };
        const TYPE_COLORS = {
            'rind': '#6fc282',
            'selg': '#e0bd7a',
            'jalad': '#d96560',
            'strength': '#a0a0a0',
            'walking': '#6fa8d4',
            'running': '#e0a35a',
            'cycling': '#a583ce',
            'swimming': '#6fbbbb',
            'hiking': '#a4866e'
        };
        const TYPE_ORDER = ['rind', 'selg', 'jalad', 'strength', 'walking', 'running', 'cycling', 'swimming', 'hiking'];

        // Mis näitajad iga kardio tüübi puhul (nimi, ühik, võti w-s, parem = väiksem?)
        const CARDIO_METRICS = {
            'walking':  [
                {name: 'Tempo',        unit: 'min/km',  key: 'pace_min_per_km',  lowerBetter: true},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Z2 aeg',       unit: 'min',     key: 'z2_min',           lowerBetter: false}
            ],
            'running':  [
                {name: 'Tempo',        unit: 'min/km',  key: 'pace_min_per_km',  lowerBetter: true},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Z2 aeg',       unit: 'min',     key: 'z2_min',           lowerBetter: false}
            ],
            'cycling':  [
                {name: 'Kiirus',       unit: 'km/h',    key: 'speed_km_per_h',   lowerBetter: false},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Distants',     unit: 'km',      key: 'distance',         lowerBetter: false}
            ],
            'swimming': [
                {name: 'Tempo',        unit: 'min/100m',key: 'pace_min_per_100m',lowerBetter: true},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Distants',     unit: 'm',       key: 'distance_m',       lowerBetter: false}
            ],
            'hiking':   [
                {name: 'Distants',     unit: 'km',      key: 'distance',         lowerBetter: false},
                {name: 'Keskmine HR',  unit: 'bpm',     key: 'avg_hr',           lowerBetter: true},
                {name: 'Kestus',       unit: 'min',     key: 'duration_min',     lowerBetter: false}
            ]
        };

        function renderChart(canvasId, labels, values, color, tooltipFmt) {
            requestAnimationFrame(() => {
                const ctx = document.getElementById(canvasId);
                if (!ctx) return;
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            borderColor: color,
                            backgroundColor: color + '33',
                            borderWidth: 2,
                            cubicInterpolationMode: 'monotone',
                            tension: 0,
                            fill: true,
                            pointRadius: 2,
                            pointHoverRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: tooltipFmt } }
                        },
                        scales: {
                            x: { ticks: { color: '#999', font: { size: 9 }, maxTicksLimit: 4 }, grid: { display: false } },
                            y: { ticks: { color: '#999', font: { size: 9 }, maxTicksLimit: 4 }, grid: { color: 'rgba(255,255,255,0.05)' } }
                        }
                    }
                });
                window._progressCharts.push(chart);
            });
        }

        function trendSummary(values, lowerBetter, unit) {
            if (!values || values.length === 0) return {html: '', trendClass: ''};
            const first = values[0];
            const last = values[values.length - 1];
            const delta = last - first;
            const absDelta = Math.abs(delta);
            let trendClass = 'flat';
            let arrow = '→';
            if (absDelta > (Math.abs(first) * 0.02)) {
                const isImprovement = lowerBetter ? delta < 0 : delta > 0;
                trendClass = isImprovement ? 'up' : 'down';
                arrow = delta > 0 ? '↑' : '↓';
            }
            const lastStr = (Number.isInteger(last) ? last : last.toFixed(1));
            return {
                html: `<div class="trend ${trendClass}">${arrow} ${lastStr} ${unit}</div><div>${values.length} sess.</div>`,
                trendClass
            };
        }

        function addProgressItem(grid, type, key, label, unit, values, labels, tooltipFmt, lowerBetter) {
            if (!values || values.length === 0) return;
            const card = document.createElement('div');
            card.className = 'progress-item';
            card.style.borderLeftColor = TYPE_COLORS[type];

            const canvasId = `chart_${type}_${key}`;
            const nameDiv = document.createElement('div');
            nameDiv.className = 'exercise-name';
            nameDiv.innerHTML = `${label}<span class="metric-unit">${unit}</span>`;
            card.appendChild(nameDiv);

            const wrap = document.createElement('div');
            wrap.className = 'mini-chart-wrapper';
            const canvas = document.createElement('canvas');
            canvas.id = canvasId;
            wrap.appendChild(canvas);
            card.appendChild(wrap);

            const summary = document.createElement('div');
            summary.className = 'progress-summary';
            summary.innerHTML = trendSummary(values, lowerBetter, unit).html;
            card.appendChild(summary);

            grid.appendChild(card);
            renderChart(canvasId, labels, values, TYPE_COLORS[type], tooltipFmt);
        }

        function updateProgress(allWorkouts) {
            const gymWorkouts = allWorkouts.filter(w => w.source === 'gymaholic');

            // Kogu iga harjutuse ajalugu
            const exerciseHistory = {};
            gymWorkouts.forEach(w => {
                const wtype = w.workout_type || 'strength';
                if (!w.exercises) return;
                w.exercises.forEach(ex => {
                    const name = ex.name;
                    const weight = ex.weight_kg || 0;
                    const lname = name.toLowerCase();
                    if (weight <= 0 || lname.includes('rowing') || lname.includes('treadmill')) return;
                    if (!exerciseHistory[name]) {
                        exerciseHistory[name] = { type: wtype, history: [] };
                    }
                    exerciseHistory[name].history.push({
                        date: w.timestamp || w.date,
                        weight: weight,
                        reps: ex.reps || 0,
                        sets: ex.sets || 0
                    });
                });
            });

            // Grupeeri treeningtüübi järgi
            const typeGroups = { 'rind': [], 'selg': [], 'jalad': [], 'strength': [] };
            Object.entries(exerciseHistory).forEach(([name, data]) => {
                const type = typeGroups[data.type] !== undefined ? data.type : 'strength';
                typeGroups[type].push({ name, type, history: data.history });
            });

            const container = document.getElementById('progressGroups');
            container.innerHTML = '';

            // Hävita vanad chart'id
            if (window._progressCharts) {
                window._progressCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
            }
            window._progressCharts = [];

            // Jõutrennide sektsioonid
            ['rind', 'selg', 'jalad', 'strength'].forEach(type => {
                const exercises = typeGroups[type];
                if (!exercises || exercises.length === 0) return;

                exercises.sort((a, b) => a.name.localeCompare(b.name, 'et'));

                const group = document.createElement('div');
                group.className = 'progress-group';
                const title = document.createElement('div');
                title.className = 'progress-group-title';
                title.textContent = TYPE_LABELS[type];
                title.style.borderLeftColor = TYPE_COLORS[type];
                group.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'progress-grid';

                exercises.forEach((ex, i) => {
                    ex.history.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                    const labels = ex.history.map(h => {
                        const d = new Date(h.date);
                        return isNaN(d) ? '' : d.toLocaleDateString('et-EE', { day: '2-digit', month: '2-digit' });
                    });
                    const weights = ex.history.map(h => h.weight);
                    const tooltipFmt = (c) => {
                        const h = ex.history[c.dataIndex];
                        return `${h.sets}×${h.reps} @ ${h.weight}kg`;
                    };
                    addProgressItem(grid, type, `ex${i}`, ex.name, 'kg', weights, labels, tooltipFmt, false);
                });

                group.appendChild(grid);
                container.appendChild(group);
            });

            // Kardio sektsioonid — iga tüübi kohta 3 näitajat
            const cardioWorkouts = allWorkouts.filter(w => w.source === 'workoutdoor');
            const cardioByType = {};
            cardioWorkouts.forEach(w => {
                const t = w.workout_type;
                if (!CARDIO_METRICS[t]) return;
                (cardioByType[t] = cardioByType[t] || []).push(w);
            });

            Object.keys(CARDIO_METRICS).forEach(type => {
                const sessions = cardioByType[type];
                if (!sessions || sessions.length < 2) return;  // Trendi jaoks vaja ≥2 sessiooni

                sessions.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));

                const group = document.createElement('div');
                group.className = 'progress-group';
                const title = document.createElement('div');
                title.className = 'progress-group-title';
                title.textContent = TYPE_LABELS[type];
                title.style.borderLeftColor = TYPE_COLORS[type];
                group.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'progress-grid';

                const labels = sessions.map(s => {
                    const d = new Date(s.timestamp || s.date);
                    return isNaN(d) ? '' : d.toLocaleDateString('et-EE', { day: '2-digit', month: '2-digit' });
                });

                CARDIO_METRICS[type].forEach(metric => {
                    const values = sessions.map(s => {
                        if (metric.key === 'distance_m') return Math.round((s.distance || 0) * 1000);
                        return s[metric.key] || 0;
                    }).filter(v => v > 0);
                    if (values.length < 2) return;
                    // Aga labels peavad vastama filtered values'ile:
                    const fullLabels = sessions.map((s, i) => {
                        const v = metric.key === 'distance_m' ? Math.round((s.distance || 0) * 1000) : (s[metric.key] || 0);
                        return v > 0 ? labels[i] : null;
                    }).filter(l => l !== null);
                    const tooltipFmt = (c) => `${values[c.dataIndex]} ${metric.unit}`;
                    addProgressItem(grid, type, metric.key, metric.name, metric.unit, values, fullLabels, tooltipFmt, metric.lowerBetter);
                });

                if (grid.children.length > 0) {
                    group.appendChild(grid);
                    container.appendChild(group);
                }
            });
        }

        // Initialize
        renderCalendar();
    </script>
</body>
</html>
